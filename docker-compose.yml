services:
    postgres:
        image: postgres:17
        restart: unless-stopped
        environment:
            POSTGRES_USER: beacon
            POSTGRES_PASSWORD: beacon
            POSTGRES_DB: beacon
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

    minio:
        image: minio/minio
        restart: unless-stopped
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: beacon
            MINIO_ROOT_PASSWORD: beaconsecret
        ports:
            - "9000:9000"
            - "9001:9001"
        volumes:
            - minio_data:/data

    mctools-analyzer:
        build:
            context: ./apps/analyzer
            dockerfile: Dockerfile
        restart: unless-stopped
        ports:
            - "3008:3000"

volumes:
    postgres_data:
    minio_data:
