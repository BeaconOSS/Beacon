name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Format check
        run: cargo fmt --manifest-path backend/Cargo.toml --all -- --check

      - name: Clippy
        run: cargo clippy --manifest-path backend/Cargo.toml --all-targets -- -D warnings

      - name: Build
        run: cargo build --manifest-path backend/Cargo.toml --locked

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check advisories, bans, licenses and sources
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check all

  machete:
    name: Cargo Machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for unused dependencies
        uses: bnjbvr/cargo-machete@main

  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for typos
        uses: crate-ci/typos@master

  frontend:
    name: Frontend (Nuxt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Type check
        run: npm run typecheck
        working-directory: frontend

  format:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check (Prettier + Tombi)
        run: npm run format:check

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [backend, deny, machete, typos, frontend, format]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/beacon
            git pull --ff-only
            docker compose -f docker-compose.prod.yml up -d --build

      - name: Verify production is healthy
        run: |
          set -e
          for i in $(seq 1 10); do
            home=$(curl -s -o /dev/null -w "%{http_code}" https://usebeacon.dev || true)
            api=$(curl -s -o /dev/null -w "%{http_code}" https://api.usebeacon.dev/health || true)
            echo "attempt $i: home=$home api=$api"
            if [ "$home" = "200" ] && [ "$api" = "200" ]; then
              echo "Production healthy."
              exit 0
            fi
            sleep 10
          done
          echo "Production did not become healthy in time." >&2
          exit 1
